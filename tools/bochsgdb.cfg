ata0-master: type=cdrom, path=./bootcd.iso, status=inserted
boot: cdrom
display_library: sdl2
cpu: count=1, ips=30000000, reset_on_triple_fault=false
memory: guest=512, host=524
romimage: file=/usr/local/share/bochs/BIOS-bochs-legacy
vga: extension=vbe
clock: sync=slowdown, time0=local
magic_break: enabled=1
panic: action=fatal
gdbstub: enabled=1, port=1234, text_base=0, data_base=0, bss_base=0
